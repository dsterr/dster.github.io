<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>{{ page.title }} • My Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>

  <header>
    {% include header.html %}
  </header>

  <main>

    <article class="card">

      {% if page.image %}
        <img src="{{ page.image }}" alt="{{ page.title }}" class="post-image" style="width:100%; border-radius: var(--radius); margin-bottom: 1.5rem;">
      {% endif %}

      <h1>{{ page.title }}</h1>

      <p class="post-meta" style="color: var(--muted); margin-top: -0.5rem;">
        {{ page.date | date: "%-d %B %Y" }}
      </p>

      <div class="post-content">
        {{ content }}
      </div>

    </article>

  </main>

  <footer>
    {% include footer.html %}
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
